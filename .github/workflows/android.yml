name: Build Web to APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Cordova Project & Inject Config
      run: |
        npm install -g cordova
        # Create a clean cordova project
        cordova create build-android com.ehsaas.health HealthApp
        cd build-android
        
        # Add Android Platform
        cordova platform add android
        
        # Install Crucial Plugins to avoid ERR_CONNECTION_REFUSED
        cordova plugin add cordova-plugin-whitelist || true
        
        # Clear default www and copy everything from root repository
        rm -rf www/*
        cd ..
        find . -maxdepth 1 -not -name 'build-android' -not -name '.git' -not -name '.github' -not -name '.' -exec cp -r {} build-android/www/ \;
        
        # Replace default config.xml with our root config.xml
        if [ -f config.xml ]; then
          cp config.xml build-android/config.xml
        fi
        
        # Handle custom logo icon if exists in root
        if [ -f icon.png ]; then
          mkdir -p build-android/res/icon/android
          cp icon.png build-android/res/icon/android/icon.png
        fi
        
        # Build the final APK
        cd build-android
        cordova build android --debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: health-app-release
        path: build-android/platforms/android/app/build/outputs/apk/debug/app-debug.apk
