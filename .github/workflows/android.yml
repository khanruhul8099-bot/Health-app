name: Build Web to APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Android App
      run: |
        npm install -g cordova
        # Create Cordova app
        cordova create my-app com.ehsaas.health HealthApp
        cd my-app
        cordova platform add android
        
        # Clear default files and copy index.html & custom assets
        rm -rf www/*
        cp ../index.html www/
        
        # Copy icon if exists, else fallback to default
        if [ -f ../icon.png ]; then
          cp ../icon.png www/icon.png
        fi

        # Override config.xml if exists in root
        if [ -f ../config.xml ]; then
          cp ../config.xml config.xml
        fi
        
        # Build Cordova Android APK
        cordova build android --debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: health-app-release
        path: my-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
