<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ehsaas Health Care</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com https://*.firebaseio.com https://*.googleapis.com https://*.gstatic.com 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src *; img-src * data: content:;">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f7f9fa; padding-bottom: 80px; }
        .header { background-color: #0b845c; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .banner { background-color: #0b845c; color: white; margin: 15px; padding: 20px; border-radius: 15px; }
        .banner h2 { font-size: 22px; margin-bottom: 5px; }
        .banner p { font-size: 14px; opacity: 0.9; margin-bottom: 15px; }
        .shop-btn { background-color: white; color: #0b845c; border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px; }
        .product-card { background: white; border-radius: 12px; padding: 12px; border: 1px solid #eef2f3; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .product-img { width: 100%; height: 120px; background-color: #f0f2f5; border-radius: 8px; object-fit: cover; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 12px; border: 1px dashed #ddd; }
        .product-title { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 8px; height: 34px; overflow: hidden; }
        .product-price-row { display: flex; justify-content: space-between; align-items: center; }
        .product-price { color: #0b845c; font-weight: bold; font-size: 15px; }
        .add-btn { background-color: #0b845c; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        
        /* Admin Panel Styles */
        .admin-section { background: white; margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid #0b845c; display: none; }
        .admin-section h3 { margin-bottom: 12px; color: #0b845c; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: bold; color: #555; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .upload-submit-btn { width: 100%; background-color: #0b845c; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .toggle-admin-btn { position: fixed; bottom: 15px; right: 15px; background: #333; color: white; border: none; padding: 10px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000; }
        .no-products { grid-column: span 2; text-align: center; padding: 40px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <div>Ehsaas Health Care</div>
        <div style="font-size: 16px; position: relative;">🛒<span style="position: absolute; top: -8px; right: -8px; background: red; color: white; border-radius: 50%; padding: 1px 5px; font-size: 10px;">0</span></div>
    </div>

    <div class="banner">
        <h2>Pure & Natural Wellness</h2>
        <p>Aapki sehat, hamari zimmedari.</p>
        <button class="shop-btn" onclick="alert('Welcome to Ehsaas Shop!')">Shop Now</button>
    </div>

    <button class="toggle-admin-btn" id="adminToggleBtn" onclick="toggleAdminPanel()">Open Admin Panel</button>
    
    <div class="admin-section" id="adminSection">
        <h3>Upload New Product</h3>
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="prodName" placeholder="e.g., Premium Ashwagandha">
        </div>
        <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" id="prodPrice" placeholder="e.g., 499">
        </div>
        <div class="form-group">
            <label>Product Image URL</label>
            <input type="text" id="prodImage" placeholder="Paste image address/link">
        </div>
        <button class="upload-submit-btn" onclick="uploadProduct()">Upload to App Live</button>
    </div>

    <div class="product-grid" id="productGrid">
        <div class="no-products">Loading products from database...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Your Firebase Configuration from screenshot
        const firebaseConfig = {
          apiKey: "AIzaSyDqEln0dkYr7WGbkEhzpw30f1kYRENQFI",
          authDomain: "ehsaas-app-b9adb.firebaseapp.com",
          projectId: "ehsaas-app-b9adb",
          storageBucket: "ehsaas-app-b9adb.appspot.com",
          messagingSenderId: "955669858418",
          appId: "1:955669858418:web:4f65c4301855fbfe26daeb",
          measurementId: "G-S9XM0TLRC6"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Toggle Admin section view
        function toggleAdminPanel() {
            const panel = document.getElementById('adminSection');
            const btn = document.getElementById('adminToggleBtn');
            if(panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                btn.innerText = 'Close Admin Panel';
                btn.style.background = 'red';
            } else {
                panel.style.display = 'none';
                btn.innerText = 'Open Admin Panel';
                btn.style.background = '#333';
            }
        }

        // Direct App Upload Function
        function uploadProduct() {
            const name = document.getElementById('prodName').value.trim();
            const price = document.getElementById('prodPrice').value.trim();
            const image = document.getElementById('prodImage').value.trim();

            if(!name || !price) {
                alert('Please enter product Name and Price!');
                return;
            }

            // Save object to Firebase Firestore
            db.collection("products").add({
                name: name,
                price: parseInt(price),
                image: image || "https://via.placeholder.com/150",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert('Product Uploaded Successfully & Live!');
                // Clear fields
                document.getElementById('prodName').value = '';
                document.getElementById('prodPrice').value = '';
                document.getElementById('prodImage').value = '';
                toggleAdminPanel();
            })
            .catch((error) => {
                alert('Error uploading product: ' + error.message);
            });
        }

        // Real-time Fetch Products from Database
        function loadProducts() {
            const grid = document.getElementById('productGrid');
            
            db.collection("products").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                grid.innerHTML = '';
                
                if(snapshot.empty) {
                    grid.innerHTML = '<div class="no-products">No products available. Open Admin Panel to upload first!</div>';
                    return;
                }
                
                snapshot.forEach((doc) => {
                    const product = doc.data();
                    
                    const cardHtml = `
                        <div class="product-card">
                            ${product.image ? `<img src="${product.image}" class="product-img" alt="${product.name}" onerror="this.src='https://via.placeholder.com/150';">` : `<div class="product-img">Product Image</div>`}
                            <div class="product-title">${product.name}</div>
                            <div class="product-price-row">
                                <div class="product-price">₹${product.price}</div>
                                <button class="add-btn" onclick="alert('${product.name} added to cart!')">Add</button>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += cardHtml;
                });
            }, (error) => {
                grid.innerHTML = `<div class="no-products" style="color:red;">Database Error: ${error.message}</div>`;
            });
        }

        // Start loading products immediately
        window.onload = loadProducts;
    </script>

    <script src="cordova.js"></script>
</body>
</html>
