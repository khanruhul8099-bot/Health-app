name: Build Web to APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova & Build Android Package
      run: |
        npm install -g cordova
        # Creating a clean cordova project
        cordova create build-android com.ehsaas.health HealthApp
        cd build-android
        cordova platform add android
        
        # Cordova ki default automatic files ko pehle saaf (delete) karein
        rm -rf www/*
        
        # Ab aapki asli source code files ko Cordova ke www folder mein force-copy karein
        cd ..
        find . -maxdepth 1 -not -name 'build-android' -not -name '.git' -not -name '.github' -not -name '.' -exec cp -r {} build-android/www/ \;
        
        # Heavy node_modules ko hatayein taaki apk halka rahe
        rm -rf build-android/www/node_modules build-android/www/build-android
        
        # Final Verification Check: Dekhein ki aapki index.html sahi jagah pahunchi ya nahi
        ls -la build-android/www/
        
        # Build Process
        cd build-android
        cordova build android --debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: health-app-release
        path: build-android/platforms/android/app/build/outputs/apk/debug/app-debug.apk
